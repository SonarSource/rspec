<div class="paragraph">
<p>Implicit casts discard information when the resulting type has a lower precision than the original type.</p>
</div>
<div class="sect1">
<h2 id="_noncompliant_code_example">Noncompliant Code Example</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>int a = 2.1f; // Noncompliant

long double f();
double d = 0;
d += f(); // Noncompliant</pre>
