<div class="paragraph">
<p>When the value of a <code>LIKE</code> clause starts with '%', '[&#8230;&#8203;]' or '_', indexes on the searched column are ignored, and a full table scan is performed instead.</p>
</div>
<div class="sect1">
<h2 id="_noncompliant_code_example">Noncompliant Code Example</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>SELECT FIRST_NAME, LAST_NAME FROM PERSONS
WHERE LAST_NAME LIKE '%PONT'</pre>
</div>
</div>
</div>
</div>
