<div class="paragraph">
<p>Shared coding conventions allow teams to collaborate effectively. This rule flags all Perl-style comments.</p>
</div>
<div class="sect1">
<h2 id="_noncompliant_code_example">Noncompliant Code Example</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>$myvar; # Noncompliant; this comment should have started with "//"</pre>
</div>
</div>
</div>
</div>
<div class="sect1">
<h2 id="_compliant_solution">Compliant Solution</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>$myvar; // Compliant; this comment started with "//"</pre>
</div>
</div>
</div>
</div>
