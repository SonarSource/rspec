<div class="paragraph">
<p>Multiple imports from the same module should be merged together to improve readability.</p>
</div>
<div class="sect1">
<h2 id="_noncompliant_code_example">Noncompliant Code Example</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>import { B1 } from 'b';
import { B2 } from 'b'; // Noncompliant</pre>
</div>
</div>
</div>
</div>
<div class="sect1">
<h2 id="_compliant_solution">Compliant Solution</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>import { B1, B2 } from 'b';</pre>
</div>
</div>
</div>
</div>
