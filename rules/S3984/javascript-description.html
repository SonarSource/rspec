<div class="paragraph">
<p>Creating a new <code>Error</code> without actually throwing it is useless and is probably due to a mistake.</p>
</div>
<div class="sect1">
<h2 id="_noncompliant_code_example">Noncompliant Code Example</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>if (x &lt; 0) {
  new Error("x must be nonnegative");
}</pre>
</div>
</div>
</div>
</div>
<div class="sect1">
<h2 id="_compliant_solution">Compliant Solution</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>if (x &lt; 0) {
  throw new Error("x must be nonnegative");
}</pre>
</div>
</div>
</div>
</div>
