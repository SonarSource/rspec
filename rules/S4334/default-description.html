<div class="paragraph">
<p>Using <code>auto</code> when the type that would be deduced is a pointer type can cause confusion. It is much better to specify the pointer part outside of <code>auto</code>.</p>
</div>
<div class="sect1">
<h2 id="_noncompliant_code_example">Noncompliant Code Example</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>auto item = new Item(); // Noncompliant</pre>
</div>
</div>
</div>
</div>
<div class="sect1">
<h2 id="_compliant_solution">Compliant Solution</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>auto* item = new Item();</pre>
</div>
</div>
</div>
</div>
