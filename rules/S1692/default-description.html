<p>COBOL files containing a large number of paragraphs are by definition difficult to understand and therefore to maintain.</p>

<h2 id="_exceptions">Exceptions</h2>
<div class="sectionbody">
<div class="paragraph">
<p>Paragraphs contained in copybooks are ignored when computing the total number of paragraphs in a program.</p>
