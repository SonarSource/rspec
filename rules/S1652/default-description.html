<div class="paragraph">
<p>Because the value returned never changes, it is inefficient to call <code>Asc</code>/<code>AscW</code> on a String constant. Use the numeric value instead.</p>
</div>
<div class="sect1">
<h2 id="_noncompliant_code_example">Noncompliant Code Example</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>intCode = Asc("*")</pre>
</div>
</div>
</div>
</div>
<div class="sect1">
<h2 id="_compliant_solution">Compliant Solution</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>intCode = 42</pre>
</div>
</div>
</div>
</div>
