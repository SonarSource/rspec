<div class="paragraph">
<p>It is simpler and clearer to return a variable than it is to test the variable and then return its value as a literal.</p>
</div>
<div class="sect1">
<h2 id="_noncompliant_code_example">Noncompliant Code Example</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>  if (var == null) {
    return null;
  }
  return var;
}</pre>
</div>
</div>
</div>
</div>
<div class="sect1">
<h2 id="_compliant_solution">Compliant Solution</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>  return var;
}</pre>
</div>
</div>
</div>
</div>
