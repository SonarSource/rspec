<div class="paragraph">
<p>Variables declared with <code>const</code> cannot be modified. Unfortunately, attempts to do so don&#8217;t always raise an error; in a non-ES2015 environment, such an attempt might simply be ignored.</p>
</div>
<div class="sect1">
<h2 id="_noncompliant_code_example">Noncompliant Code Example</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>const pi = "yes, please";
pi = 3.14;  // Noncompliant</pre>
</div>
</div>
</div>
</div>
