<div class="paragraph">
<p>This rule checks that the specified HTML elements are not present.</p>
</div>
<div class="sect1">
<h2 id="_noncompliant_code_example">Noncompliant Code Example</h2>
<div class="sectionbody">
<div class="paragraph">
<p>For a disallowed list of "font,center":</p>
</div>
<div class="listingblock">
<div class="content">
<pre>&lt;center&gt;&lt;font color="red"&gt;Hello World!&lt;/font&gt;&lt;/center&gt; &lt;!-- Noncompliant --&gt;</pre>
</div>
</div>
</div>
</div>
<div class="sect1">
<h2 id="_compliant_solution">Compliant Solution</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>&lt;div class="centerRed"&gt;Hello World!&lt;/div&gt;</pre>
</div>
</div>
</div>
</div>
