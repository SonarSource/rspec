<div class="paragraph">
<p>Certain bit operations are just silly and should not be performed because their results are predictable.</p>
</div>
<div class="paragraph">
<p>Specifically, using <code>AnyValue And -1</code> will always result in the original value, as will <code>AnyValue Xor 0</code> and <code>AnyValue Or 0</code>.</p>
</div>
