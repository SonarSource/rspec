<div class="paragraph">
<p>COBOL files containing a large number of sections are by definition difficult to understand and therefore to maintain.</p>
</div>
<div class="sect1">
<h2 id="_exceptions">Exceptions</h2>
<div class="sectionbody">
<div class="paragraph">
<p>Sections contained in copybooks are not taken into account when computing the total number of sections in a program.</p>
</div>
