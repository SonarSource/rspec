<div class="paragraph">
<p>The <code>for of</code> statement can only iterate over objects that have an <code>iterator</code> property.</p>
</div>
<div class="sect1">
<h2 id="_noncompliant_code_example">Noncompliant Code Example</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>let obj = {};
for(let element of obj) {   // Noncompliant
  ...
}</pre>
</div>
</div>
</div>
</div>
<div class="sect1">
<h2 id="_compliant_solution">Compliant Solution</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>let array = [];
for(let element of array) {
  ...
}</pre>
</div>
</div>
</div>
</div>
