<div class="paragraph">
<p>Indicators should not be used on "IF" statements because they foster poor logic flow and result in code that is difficult to read and maintain.</p>
</div>
<div class="sect1">
<h2 id="_noncompliant_code_example">Noncompliant Code Example</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>C   99FLD1          IFEQ      FLD2</pre>
</div>
</div>
</div>
</div>
<div class="sect1">
<h2 id="_compliant_solution">Compliant Solution</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>C     FLD1          IFEQ      FLD2
C     *IN99         ANDEQ     *ON</pre>
</div>
</div>
</div>
</div>
