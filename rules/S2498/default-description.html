<div class="paragraph">
<p>When using Backbone.js, the use of <code>has</code> to check attribute existence is clearer and more readable than the use of <code>get</code>, and is therefore preferred.</p>
</div>
<div class="sect1">
<h2 id="_noncompliant_code_example">Noncompliant Code Example</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>if (myModel.get('myProperty')) { ... }</pre>
</div>
</div>
</div>
</div>
<div class="sect1">
<h2 id="_compliant_solution">Compliant Solution</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>if (myModel.has('myProperty') { ... }</pre>
</div>
</div>
</div>
</div>
