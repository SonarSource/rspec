<div class="paragraph">
<p>Using the <code>LIKE</code> operator in SQL <code>WHERE</code> conditions can highly impact the performance of the request. The use of this operator should be strongly indicated.</p>
</div>
<div class="sect1">
<h2 id="_noncompliant_code_example">Noncompliant Code Example</h2>
<div class="sectionbody">
<div class="listingblock">
<div class="content">
<pre>SELECT *
       FROM doktl
       INTO TABLE text_tab
       WHERE doktext LIKE srch_str.</pre>
</div>
</div>
</div>
</div>
